steps:
  # ------------------------------------------------------------------
  # Step 1: Fetch Secrets (untuk di-inject saat docker build)
  # NEXT_PUBLIC_* HARUS di-bake ke image saat build time
  # ------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'fetch-secrets'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud secrets versions access latest --secret="NEXT_PUBLIC_SUPABASE_URL" > /workspace/url.txt
        gcloud secrets versions access latest --secret="NEXT_PUBLIC_SUPABASE_ANON_KEY" > /workspace/key.txt

  # ------------------------------------------------------------------
  # Step 2: Build Docker Image
  # --build-arg meng-inject NEXT_PUBLIC_* ke dalam layer build Next.js
  # ------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    waitFor: ['fetch-secrets']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SUPABASE_URL=$(cat /workspace/url.txt)
        SUPABASE_KEY=$(cat /workspace/key.txt)
        docker build \
          --build-arg NEXT_PUBLIC_SUPABASE_URL="$SUPABASE_URL" \
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$SUPABASE_KEY" \
          -t $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/app:$COMMIT_SHA \
          -t $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/app:latest \
          .

  # ------------------------------------------------------------------
  # Step 3: Push ke Artifact Registry
  # ------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    waitFor: ['build-image']
    args:
      - 'push'
      - '--all-tags'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/app'

  # ------------------------------------------------------------------
  # Step 4: Deploy ke Cloud Run
  # NEXT_PUBLIC_* sudah baked-in di image — tidak perlu di-set ulang.
  # Hanya inject server-only secrets sebagai runtime env vars.
  # ------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloudrun'
    waitFor: ['push-image']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE'
      - '--image'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/app:$COMMIT_SHA'
      - '--region'
      - '$_REGION'
      - '--platform'
      - 'managed'
      - '--min-instances'
      - '0'
      - '--cpu'
      - '1'
      - '--memory'
      - '1Gi'
      - '--allow-unauthenticated'
      - '--quiet'
      - '--set-secrets'
      - 'WEB3FORMS_ACCESS_KEY=WEB3FORMS_ACCESS_KEY:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest'

# ------------------------------------------------------------------
# Konfigurasi Build
# ------------------------------------------------------------------
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

# Timeout build (maksimal 20 menit)
timeout: '1200s'

# ------------------------------------------------------------------
# Substitutions — bisa di-override dari CLI atau Cloud Build Trigger
# ------------------------------------------------------------------
substitutions:
  _REGION: 'us-central1'
  _SERVICE: 'new-porto-service'
  _REPO: 'new-porto-repo'
