steps:
  # ------------------------------------------------------------------
  # Step 1: Build Docker Image
  # COMMIT_SHA digunakan sebagai tag image supaya setiap build bisa di-rollback
  # Secrets (Supabase URL & Key) diambil dari GCP Secret Manager — lebih aman
  # ------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SUPABASE_URL=$(gcloud secrets versions access latest --secret="NEXT_PUBLIC_SUPABASE_URL")
        SUPABASE_KEY=$(gcloud secrets versions access latest --secret="NEXT_PUBLIC_SUPABASE_ANON_KEY")
        docker build \
          --build-arg NEXT_PUBLIC_SUPABASE_URL="$$SUPABASE_URL" \
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="$$SUPABASE_KEY" \
          -t $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/app:$COMMIT_SHA \
          -t $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/app:latest \
          .

  # ------------------------------------------------------------------
  # Step 2: Push ke Artifact Registry
  # Dua tag: COMMIT_SHA (untuk rollback spesifik) & latest (untuk referensi)
  # ------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    waitFor: ['build-image']
    args:
      - 'push'
      - '--all-tags'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/app'

  # ------------------------------------------------------------------
  # Step 3: Deploy ke Cloud Run
  # --region dan --image sudah hardcode agar lebih eksplisit
  # ------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloudrun'
    waitFor: ['push-image']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE'
      - '--image'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/app:$COMMIT_SHA'
      - '--region'
      - '$_REGION'
      - '--platform'
      - 'managed'
      - '--min-instances'
      - '0'
      - '--cpu'
      - '1'
      - '--memory'
      - '1Gi'
      - '--allow-unauthenticated'
      - '--quiet'
      - '--remove-env-vars'
      - 'NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY'

# ------------------------------------------------------------------
# Konfigurasi Build
# ------------------------------------------------------------------
options:
  # Gunakan mesin build yang lebih cepat
  machineType: 'E2_HIGHCPU_8'
  logging: GCS_ONLY

# Timeout build (maksimal 20 menit)
timeout: '1200s'

# ------------------------------------------------------------------
# Substitutions — bisa di-override dari CLI atau Cloud Build Trigger
# ------------------------------------------------------------------
substitutions:
  _REGION: 'us-central1'
  _SERVICE: 'new-porto-service'
  _REPO: 'new-porto-repo'
